<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Event Scheduler</title>

<style>

body{
font-family:Arial;
margin:40px;
}

.day{
border:1px solid #ddd;
padding:10px;
margin:5px;
display:flex;
justify-content:space-between;
}

.available{background:#b6f5b6}
.maybe{background:#fff3a6}
.not{background:#ffb6b6}

button{
margin-top:20px;
padding:10px 20px;
}

</style>

</head>

<body>

<h1>Event Scheduler</h1>

Name

<input id="name">

<h2>Select Dates</h2>

<div id="calendar"></div>

<button onclick="save()">Submit</button>

<h2>Admin View</h2>

<button onclick="load()">Show Responses</button>

<div id="responses"></div>

<script>

const dates = [
"2026-03-10",
"2026-03-11",
"2026-03-12",
"2026-03-13",
"2026-03-14"
]

let status = {}

const calendar = document.getElementById("calendar")

dates.forEach(date=>{

let div = document.createElement("div")
div.className="day"
div.innerHTML=date

div.onclick=()=>{

if(!status[date]) status[date]="available"
else if(status[date]=="available") status[date]="maybe"
else if(status[date]=="maybe") status[date]="not"
else status[date]=null

div.classList.remove("available","maybe","not")

if(status[date]=="available") div.classList.add("available")
if(status[date]=="maybe") div.classList.add("maybe")
if(status[date]=="not") div.classList.add("not")

}

calendar.appendChild(div)

})

function save(){

let name=document.getElementById("name").value

fetch("YOUR_SCRIPT_URL",{

method:"POST",

body:JSON.stringify({
name:name,
responses:status
})

})

alert("Submitted!")

}

function load(){

fetch("YOUR_SCRIPT_URL")

.then(r=>r.json())

.then(data=>{

let out=document.getElementById("responses")

out.innerHTML=""

data.forEach(row=>{

let div=document.createElement("div")

div.innerHTML=row.name+" : "+JSON.stringify(row.responses)

out.appendChild(div)

})

})

}

</script>

</body>
</html>
